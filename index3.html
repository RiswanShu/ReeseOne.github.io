<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rischan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  transition:0.5s ease;
}

/* 🌅 Warm Gradient */
body.warm{
  background:linear-gradient(-45deg,#7f5539,#b08968,#ddb892,#a98467);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
}

/* 🌙 Dark Mode */
body.dark{
  background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364);
  background-size:400% 400%;
  animation:gradientMove 20s ease infinite;
}

/* Ambient Glow */
.glow{
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle,rgba(255,255,255,0.2),transparent 70%);
  filter:blur(80px);
  z-index:0;
}

/* Glass Card */
.card{
  position:relative;
  z-index:2;
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.15);
  border-radius:30px;
  padding:45px 30px;
  width:340px;
  text-align:center;
  box-shadow: 0 0 25px rgba(255,255,255,0.4);
  border:1px solid rgba(255,255,255,0.25);
  animation:fadeUp 1.2s ease;
  transition:0.4s ease;
}

.profile{
  width:110px;
  height:110px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(255,255,255,0.5);
  margin-bottom:20px;
  transition:0.4s ease;
}

.profile:hover{
  transform:scale(1.08) rotate(3deg);
}

/* Text */
h1{
  color:white;
  font-size:26px;
  font-weight:700;
}

.typing{
  color:rgba(255,255,255,0.85);
  margin:10px 0 30px;
  font-weight:300;
  min-height:20px;
}

/* Buttons */
.button{
  display:block;
  margin:12px 0;
  padding:14px;
  border-radius:15px;
  text-decoration:none;
  font-weight:500;
  transition:0.3s ease;
  background:rgba(255,255,255,0.2);
  color:white;
  border:1px solid rgba(255,255,255,0.3);
}

.button:hover{
  background:white;
  color:#7f5539;
  transform:translateY(-4px);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* Toggle */
.toggle{
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(255,255,255,0.2);
  border:none;
  padding:8px 12px;
  border-radius:20px;
  color:white;
  cursor:pointer;
  backdrop-filter:blur(10px);
}

/* Particles */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:rgba(255,255,255,0.4);
  border-radius:50%;
  animation:float 10s linear infinite;
}

/* Animations */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

</style>
</head>

<body class="warm">

<div class="glow"></div>

<button class="toggle" onclick="toggleMode()">Toggle</button>

<div class="card">
  <img src="foto.jpg" class="profile">
  <h1>Reeseeone_Shu</h1>
  <div class="typing" id="typing"></div>

<a href="https://instagram.com/riswanshu_e"
  <a href="#" class="button" target="_blank">Instagram</a>
  <a href="#" class="button" target="_blank">GitHub</a>
<a href="https://www.facebook.com/share/1Dx9z6MFjH/"  
  <a href="#" class="button" target="_blank">Facebook</a>
</div>

<script>

/* Typing Effect */
const text = "Exploring code & psychology";
let i = 0;
function typeEffect(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect,50);
  }
}
typeEffect();

/* Dark Toggle */
function toggleMode(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("warm");
}

/* Generate Particles */
for(let i=0;i<20;i++){
  let p = document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(p);
}

</script>

</body>
</html>
